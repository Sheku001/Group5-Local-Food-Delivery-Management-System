<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Orders</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app has-nav">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back" onclick="history.back()">&#8249;</button>
    <h2>📋 My Orders</h2>
    <div class="spacer"></div>
  </div>

  <!-- Filter tabs -->
  <div style="display:flex;background:var(--surface);border-bottom:1px solid var(--border);">
    <button class="auth-tab active" id="tab-all"       onclick="filterOrders('all')">All</button>
    <button class="auth-tab"        id="tab-active"    onclick="filterOrders('active')">Active</button>
    <button class="auth-tab"        id="tab-delivered" onclick="filterOrders('delivered')">Delivered</button>
  </div>

  <!-- Orders list -->
  <div id="orders-list" style="flex:1;overflow-y:auto;padding-bottom:8px;"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="customer.html" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-item" href="menu.html" data-page="menu">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Menu
    </a>
    <a class="nav-item nav-cart" href="cart.html" data-page="cart">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
      </div>
      Cart
    </a>
    <a class="nav-item active" href="orders.html" data-page="orders">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Orders
    </a>
    <a class="nav-item" href="profile.html" data-page="profile">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>
</div>

<div id="toast"></div>
<script src="app.js"></script>
<script>
  requireAuth();

  let currentFilter = 'all';

  function filterOrders(filter) {
    currentFilter = filter;
    /* Update active tab */
    ['all','active','delivered'].forEach(f => {
      document.getElementById('tab-' + f).classList.toggle('active', f === filter);
    });
    renderOrders();
  }

  function renderOrders() {
    const u        = App.user;
    const all      = App.orders.filter(o => o.userId === u.id);
    const list     = document.getElementById('orders-list');

    let filtered;
    if (currentFilter === 'active') {
      filtered = all.filter(o => o.status !== 'delivered' && o.status !== 'cancelled');
    } else if (currentFilter === 'delivered') {
      filtered = all.filter(o => o.status === 'delivered');
    } else {
      filtered = all;
    }

    if (filtered.length === 0) {
      list.innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
          <div style="font-size:48px;margin-bottom:12px;">📋</div>
          <p style="font-family:var(--font-h);font-size:14px;font-weight:600;margin-bottom:6px;">No orders here yet</p>
          <p style="font-size:13px;margin-bottom:20px;">Browse the menu and place your first order!</p>
          <a href="menu.html" class="btn-green" style="display:block;max-width:180px;margin:0 auto;padding:12px;text-align:center;">Browse Menu</a>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(o => {
      const cfg = STATUS[o.status] || { label: o.status, cls: 's-pending' };
      const date = new Date(o.placedAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
      return `
        <div class="order-card" style="margin-top:10px;cursor:pointer;"
             onclick="window.location.href='track.html?id=${encodeURIComponent(o.id)}'">
          <div class="order-card-head">
            <span class="order-card-id">${o.id}</span>
            <span class="status-badge ${cfg.cls}">${cfg.label}</span>
          </div>
          <div class="order-card-items">${o.items.map(i => i.name + ' ×' + i.qty).join(', ')}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
            <span style="font-size:11px;color:var(--text-muted);">📅 ${date}</span>
            <span style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--green);">SLE ${o.total}</span>
          </div>
          <div style="margin-top:8px;">
            <span style="font-size:11px;color:var(--text-muted);">📍 ${o.location} · 💳 ${o.payment === 'card' ? 'Credit Card' : o.payment === 'mobile' ? 'Mobile Money' : 'Cash on Delivery'}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  renderOrders();
</script>
</body>
</html>
