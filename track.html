<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Earnings — Vendor</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .track-hero {
      background: var(--green);
      color: #fff;
      text-align: center;
      padding: 32px 20px 28px;
    }
    .track-icon { font-size: 56px; margin-bottom: 10px; }
    .track-hero h2 { font-family: var(--font-h); font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .track-hero p  { font-size: 13px; opacity: .85; }

    .detail-line {
      display: flex;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      background: var(--surface);
    }
    .detail-line .lbl { color: var(--text-sub); font-family: var(--font-h); font-weight: 500; }
    .detail-line .val { font-family: var(--font-h); font-weight: 700; }
  </style>
</head>
<body>
<div class="app has-nav">
  <div class="top-bar">
    <button class="back" onclick="history.back()">&#8249;</button>
    <h2>My Earnings</h2>
    <div class="spacer"></div>
  </div>

  <div id="track-body" style="flex:1;overflow-y:auto;"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="index.html" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-item" href="vendor-orders.html">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Orders
    </a>
    <a class="nav-item" href="vendor-menu.html">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Menu
    </a>
    <a class="nav-item" href="cart.html" data-page="cart">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
      </div>
      Cart
    </a>
    <a class="nav-item" href="auth.html" data-page="login">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Login /&nbsp;<br/>Register
    </a>
  </nav>
</div>

<div id="toast"></div>
<script src="app.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const orderId = params.get('id');

  const STEP_LABELS = ['Placed','Preparing','On Way','Delivered'];
  const STEP_ICONS  = ['📋','👨‍🍳','🛵','✅'];

  function render() {
    const all       = App.orders;
    const delivered = all.filter(o => o.status === 'delivered');
    const total     = delivered.reduce((s,o) => s+o.total, 0);
    const today     = delivered.filter(o => new Date(o.placedAt).toDateString() === new Date().toDateString());
    const todayAmt  = today.reduce((s,o) => s+o.total, 0);

    document.getElementById('total-earn').textContent = 'SLE ' + total;
    document.getElementById('earn-sub').textContent   = delivered.length + ' completed order' + (delivered.length===1?'':'s');

    document.getElementById('earn-stats').innerHTML = `
      <div class="stat-box"><div class="sn" style="font-size:15px;">SLE ${todayAmt}</div><div class="sl">Today</div></div>
      <div class="stat-box"><div class="sn">${today.length}</div><div class="sl">Today's Orders</div></div>
      <div class="stat-box"><div class="sn">${delivered.length}</div><div class="sl">Total Orders</div></div>
    `;

    /* Line chart — 7 mock + real data points */
    const days  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const vals  = [120, 340, 210, 480, 390, 560, total || 0];
    const max   = Math.max(...vals, 1);
    const W=320, H=100, pad=30;
    const pts = vals.map((v,i) => {
      const x = pad + (i/(vals.length-1))*(W-2*pad);
      const y = H - pad - (v/max)*(H-2*pad);
      return {x,y,v};
    });
    const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
    /* Filled area path */
    const areaPath = `M${pts[0].x},${H-pad} ` + pts.map(p=>`L${p.x},${p.y}`).join(' ') + ` L${pts[pts.length-1].x},${H-pad} Z`;

    document.getElementById('earn-chart').innerHTML = `
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2A7A2E" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#2A7A2E" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Area fill -->
      <path d="${areaPath}" fill="url(#g)"/>
      <!-- Grid lines -->
      ${[0,.25,.5,.75,1].map(t=>`<line x1="${pad}" y1="${H-pad-(t*(H-2*pad))}" x2="${W-pad}" y2="${H-pad-(t*(H-2*pad))}" stroke="#E0E0E0" stroke-width="0.5"/>`).join('')}
      <!-- Line -->
      <polyline points="${polyline}" fill="none" stroke="#2A7A2E" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- Dots + value labels -->
      ${pts.map((p,i)=>`
        <circle cx="${p.x}" cy="${p.y}" r="3" fill="#2A7A2E"/>
        <text x="${p.x}" y="${p.y-7}" text-anchor="middle" class="chart-val">SLE ${p.v}</text>
        <text x="${p.x}" y="${H-8}" text-anchor="middle" class="chart-label">${days[i]}</text>
      `).join('')}
    `;

    /* Completed orders list */
    const el = document.getElementById('earn-orders');
    if (delivered.length === 0) {
      el.innerHTML = `<p style="padding:16px;font-size:13px;color:var(--text-muted);">No completed orders yet.</p>`;
      return;
    }

    const cfg      = STATUS[order.status];
    const stepIdx  = cfg.step;

    /* Build steps bar */
    const stepsHTML = STATUS_KEYS.map((k, i) => {
      const cls = i < stepIdx ? 'done' : i === stepIdx ? 'active' : '';
      return `
        <div class="step ${cls}">
          <div class="step-circle">${i < stepIdx ? '✓' : STEP_ICONS[i]}</div>
          <div class="step-lbl">${STEP_LABELS[i]}</div>
        </div>
        ${i < 3 ? `<div style="flex:1;height:2px;background:${i<stepIdx?'var(--green)':'var(--border)'};margin-top:13px;"></div>` : ''}
      `;
    }).join('');

    /* Order items detail */
    const itemsHTML = order.items.map(i => `
      <div class="detail-line">
        <span class="lbl">${i.name} × ${i.qty}</span>
        <span class="val">SLE ${i.price * i.qty}</span>
      </div>
    `).join('');

    document.getElementById('track-body').innerHTML = `
      <!-- Status hero -->
      <div class="track-hero">
        <div class="track-icon">${cfg.icon}</div>
        <h2>${cfg.label}</h2>
        <p>Order ${order.id}</p>
      </div>

      <!-- Step progress bar -->
      <div class="steps">${stepsHTML}</div>

      <div class="gap8"></div>

      <!-- Order items -->
      <p class="section-head">Your Order</p>
      ${itemsHTML}
      <div class="detail-line">
        <span class="lbl">Delivery Fee</span>
        <span class="val">SLE 5</span>
      </div>
      <div class="detail-line" style="font-weight:800;">
        <span class="lbl" style="font-weight:700;">Total</span>
        <span class="val">SLE ${order.total}</span>
      </div>

      <div class="gap8"></div>

      <!-- Delivery info -->
      <p class="section-head">Delivery Info</p>
      <div class="detail-line">
        <span class="lbl">📍 Location</span>
        <span class="val">${order.location}</span>
      </div>
      <div class="detail-line">
        <span class="lbl">💳 Payment</span>
        <span class="val">${order.payment === 'card' ? 'Credit Card' : order.payment === 'mobile' ? 'Mobile Money' : 'Cash on Delivery'}</span>
      </div>

      <div class="gap14"></div>

      ${order.status !== 'delivered' ? `
        <!-- Demo: simulate next status -->
        <div style="padding:0 16px 16px;">
          <button onclick="advance()" style="width:100%;padding:12px;background:var(--page-bg);border:1.5px dashed var(--border);border-radius:var(--r-btn);font-family:var(--font-h);font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;">
            🔄 Simulate next status (demo)
          </button>
        </div>
      ` : `
        <div style="padding:0 16px 16px;">
          <a href="menu.html" class="btn-green" style="display:block;text-align:center;padding:14px;">Order Again 🍛</a>
        </div>
      `}
    `;
  }

  function advance() {
    const order = App.orders.find(o => o.id === orderId);
    if (!order) return;
    const i = STATUS_KEYS.indexOf(order.status);
    if (i < STATUS_KEYS.length - 1) {
      order.status = STATUS_KEYS[i + 1];
      App.setOrders(App.orders);
      toast('Status: ' + STATUS[order.status].label);
      render();
    }
  }

  render();
</script>
</body>
</html>
