<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Track Order</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Vertical step tracker ── */
    .v-steps { padding: 16px 20px; background: var(--surface); }
    .v-step {
      display: flex; gap: 16px; position: relative;
    }
    /* vertical connector line between steps */
    .v-step:not(:last-child) .v-step-line {
      position: absolute;
      left: 13px; top: 28px;
      width: 2px; height: calc(100% - 4px);
      background: var(--border);
      z-index: 0;
    }
    .v-step.done:not(:last-child) .v-step-line  { background: var(--green); }
    .v-step.active:not(:last-child) .v-step-line { background: var(--border); }

    .v-step-icon {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; z-index: 1; position: relative;
    }
    .v-step.done   .v-step-icon { background: var(--green);  border-color: var(--green);  color: #fff; }
    .v-step.active .v-step-icon { background: var(--orange); border-color: var(--orange); color: #fff; }

    .v-step-body { flex: 1; padding-bottom: 20px; }
    .v-step-body h4 {
      font-family: var(--font-h); font-size: 13px; font-weight: 700;
      color: var(--text-muted); margin-bottom: 2px;
    }
    .v-step.done   .v-step-body h4 { color: var(--green); }
    .v-step.active .v-step-body h4 { color: var(--orange); }
    .v-step-body p { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="app has-nav">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back" onclick="history.back()">&#8249;</button>
    <h2>Track Order</h2>
    <div class="spacer"></div>
  </div>

  <div id="track-body" style="flex:1;overflow-y:auto;background:var(--page-bg);"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="customer.html" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-item" href="menu.html" data-page="menu">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Menu
    </a>
    <a class="nav-item nav-cart" href="cart.html" data-page="cart">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
      </div>
      Cart
    </a>
    <a class="nav-item active" href="orders.html" data-page="orders">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Orders
    </a>
    <a class="nav-item" href="profile.html" data-page="profile">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>
</div>

<div id="toast"></div>
<script src="app.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const orderId = params.get('id');

  const STEP_LABELS = ['Order Placed', 'Being Prepared', 'Out for Delivery', 'Delivered'];
  const STEP_DESC   = ['Your order has been received', 'The kitchen is preparing your food', 'Your order is on the way', 'Enjoy your meal!'];
  const STEP_ICONS  = ['🧾', '👨‍🍳', '🛵', '✅'];

  function render() {
    const order = App.orders.find(o => o.id === orderId);
    if (!order) {
      document.getElementById('track-body').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
          <div style="font-size:48px;">❓</div>
          <p style="font-family:var(--font-h);font-size:14px;margin-top:12px;">Order not found</p>
          <a href="menu.html" class="btn-green" style="display:block;max-width:160px;margin:20px auto;">Go to Menu</a>
        </div>`;
      return;
    }

    const cfg     = STATUS[order.status];
    const stepIdx = cfg.step;

    /* Vertical steps HTML */
    const stepsHTML = STATUS_KEYS.map((k, i) => {
      const cls = i < stepIdx ? 'done' : i === stepIdx ? 'active' : '';
      return `
        <div class="v-step ${cls}">
          <div class="v-step-line"></div>
          <div class="v-step-icon">${i < stepIdx ? '✓' : STEP_ICONS[i]}</div>
          <div class="v-step-body">
            <h4>${STEP_LABELS[i]}</h4>
            <p>${cls ? STEP_DESC[i] : '–'}</p>
          </div>
        </div>
      `;
    }).join('');

    const itemsHTML = order.items.map(i => `
      <div class="detail-line">
        <span class="lbl">${i.name} × ${i.qty}</span>
        <span class="val">SLE ${i.price * i.qty}</span>
      </div>
    `).join('');

    const payLabel = order.payment === 'card' ? 'Credit Card' : order.payment === 'mobile' ? 'Mobile Money' : 'Cash on Delivery';

    /* Estimated time based on status */
    const ETA = { pending:'30–45 mins', preparing:'20–30 mins', transit:'5–15 mins', delivered:'Delivered' };
    const placedTime = new Date(order.placedAt).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    const placedDate = new Date(order.placedAt).toLocaleDateString('en-GB', { day:'numeric', month:'short' });

    document.getElementById('track-body').innerHTML = `
      <!-- Status hero (white top card) -->
      <div style="background:var(--surface);padding:24px 20px 18px;text-align:center;border-bottom:1px solid var(--border);">
        <div style="font-size:52px;margin-bottom:8px;">${cfg.icon}</div>
        <h2 style="font-family:var(--font-h);font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px;">${cfg.label}</h2>
        <p style="font-size:13px;color:var(--text-muted);">Order ${order.id}</p>
        ${order.status !== 'delivered' ? `
        <div style="display:inline-block;margin-top:10px;padding:6px 16px;background:var(--green-bg);border-radius:var(--r-pill);">
          <span style="font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--green-dark);">⏱ ETA: ${ETA[order.status]}</span>
        </div>` : ''}
        <div style="display:flex;justify-content:center;gap:20px;margin-top:12px;">
          <div style="text-align:center;">
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-h);">PLACED</div>
            <div style="font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--text);">${placedTime} · ${placedDate}</div>
          </div>
          <div style="width:1px;background:var(--border);"></div>
          <div style="text-align:center;">
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-h);">ITEMS</div>
            <div style="font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--text);">${order.items.length} item${order.items.length > 1 ? 's' : ''}</div>
          </div>
          <div style="width:1px;background:var(--border);"></div>
          <div style="text-align:center;">
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-h);">TOTAL</div>
            <div style="font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--green);">SLE ${order.total}</div>
          </div>
        </div>
      </div>

      <!-- Vertical progress tracker -->
      <p class="section-head">Order Progress</p>
      <div class="v-steps">${stepsHTML}</div>

      <div class="gap8"></div>

      <!-- Order items -->
      <p class="section-head">Your Order</p>
      <div style="background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
        ${itemsHTML}
        <div class="detail-line">
          <span class="lbl">Delivery Fee</span>
          <span class="val">SLE 5</span>
        </div>
        <div class="detail-line" style="font-weight:800;">
          <span class="lbl" style="font-weight:700;">Total</span>
          <span class="val">SLE ${order.total}</span>
        </div>
      </div>

      <div class="gap8"></div>

      <!-- Delivery info -->
      <p class="section-head">Delivery Info</p>
      <div style="background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
        <div class="detail-line"><span class="lbl">📍 Location</span><span class="val">${order.location}</span></div>
        <div class="detail-line"><span class="lbl">💳 Payment</span><span class="val">${payLabel}</span></div>
      </div>

      <div class="gap14"></div>

      ${order.status === 'transit' ? `
      <!-- Rider info card — shown when order is out for delivery -->
      <p class="section-head">Your Rider</p>
      <div style="background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;">
        <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#0D47A1,#1565C0);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🛵</div>
        <div style="flex:1;">
          <div style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;">Campus Rider</div>
          <div style="font-size:12px;color:var(--text-muted);">On the way to your location</div>
        </div>
        <button onclick="toast('📞 Call rider — coming soon!')" style="padding:8px 14px;background:var(--green-bg);color:var(--green-dark);border:none;border-radius:var(--r-pill);font-family:var(--font-h);font-size:11px;font-weight:700;cursor:pointer;">📞 Call</button>
      </div>
      <div class="gap8"></div>` : ''}

      ${order.status !== 'delivered' ? `
        <div style="padding:0 16px 8px;">
          <button onclick="shareStatus()" style="width:100%;padding:11px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-btn);font-family:var(--font-h);font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
            📤 Share Order Status
          </button>
        </div>
        <div style="padding:0 16px 16px;">
          <button onclick="advance()" style="width:100%;padding:12px;background:var(--page-bg);border:1.5px dashed var(--border);border-radius:var(--r-btn);font-family:var(--font-h);font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;">
            🔄 Simulate next status (demo)
          </button>
        </div>
      ` : `
        <div style="padding:0 16px 8px;">
          <div style="background:var(--green-bg);border-radius:var(--r-card);padding:14px;text-align:center;">
            <div style="font-size:28px;margin-bottom:6px;">🎉</div>
            <div style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--green-dark);">Order delivered successfully!</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Thank you for ordering with us</div>
          </div>
        </div>
        <div style="padding:8px 16px 16px;">
          <a href="menu.html" class="btn-green" style="display:block;text-align:center;padding:14px;">Order Again 🍽️</a>
        </div>
      `}
    `;
  }

  /* ── Share order status ── */
  function shareStatus() {
    const order = App.orders.find(o => o.id === orderId);
    if (!order) return;
    const text = `My order ${order.id} is currently "${STATUS[order.status].label}" — Local Food Delivery, UniMak Campus.`;
    if (navigator.share) {
      navigator.share({ title: 'Order Status', text });
    } else {
      navigator.clipboard.writeText(text).then(() => toast('📋 Status copied to clipboard!'));
    }
  }

  function advance() {
    const order = App.orders.find(o => o.id === orderId);
    if (!order) return;
    const i = STATUS_KEYS.indexOf(order.status);
    if (i < STATUS_KEYS.length - 1) {
      order.status = STATUS_KEYS[i + 1];
      App.setOrders(App.orders);
      toast('Status: ' + STATUS[order.status].label);
      render();
    }
  }

  render();
</script>
</body>
</html>
