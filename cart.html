<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Sticky checkout bar at the bottom above nav */
    .checkout-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
    }
  </style>
</head>
<body>
<div class="app has-nav">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back" onclick="history.back()">&#8249;</button>
    <h2>Cart</h2>
    <div class="spacer"></div>
  </div>

  <!-- Cart items — rendered by JS -->
  <div id="cart-body" style="flex:1;overflow-y:auto;"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="index.html" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-item" href="menu.html" data-page="menu">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Menu
    </a>
    <a class="nav-item active nav-cart" href="cart.html" data-page="cart">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
      </div>
      Cart
    </a>
    <a class="nav-item" href="auth.html" data-page="login">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Login /&nbsp;<br/>Register
    </a>
  </nav>

</div>
<div id="toast"></div>
<script src="app.js"></script>
<script>
  function render() {
    const cart = App.cart;
    const body = document.getElementById('cart-body');

    if (cart.length === 0) {
      body.innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
          <div style="font-size:52px;margin-bottom:12px;">🛒</div>
          <p style="font-family:var(--font-h);font-size:15px;font-weight:600;margin-bottom:8px;">Your cart is empty</p>
          <p style="font-size:13px;">Add meals from the menu!</p>
          <a href="menu.html" class="btn-green" style="display:block;max-width:180px;margin:20px auto;padding:12px;text-align:center;">Browse Menu</a>
        </div>`;
      return;
    }

    /* Cart items list */
    let html = cart.map(item => `
      <div class="cart-item">
        <img class="cart-thumb" src="${item.img}" alt="${item.name}" loading="lazy"/>
        <div class="cart-info">
          <div class="cart-name">${item.name}</div>
          <!-- Qty controls + line price -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
            <div class="qty-row">
              <button class="qty-btn" onclick="changeQty(${item.id},-1)">&#8722;</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id},1)">&#43;</button>
            </div>
            <span class="cart-price">SLE ${item.price * item.qty}</span>
          </div>
        </div>
      </div>
    `).join('');

    /* Total row */
    html += `
      <div class="info-row total-row" style="margin-top:0;">
        <span class="label">Total</span>
        <span class="value">SLE ${cartTotal()}</span>
      </div>`;

    /* Proceed to Checkout button */
    html += `
      <div style="padding:14px 16px 8px;">
        <button class="btn-green" onclick="goCheckout()">Proceed to Checkout</button>
      </div>`;

    body.innerHTML = html;
  }

  function changeQty(id, delta) {
    updateQty(id, delta);
    render();
  }

  function goCheckout() {
    if (!App.user) {
      toast('Please login first');
      setTimeout(() => window.location.href = 'auth.html', 900);
      return;
    }
    window.location.href = 'checkout.html';
  }

  render();
  setActiveNav('cart');
</script>
</body>
</html>
