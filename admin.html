<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .admin-hero { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:24px 20px 20px; color:#fff; }
    .hero-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .hero-top h2 { font-family:var(--font-h); font-size:18px; font-weight:800; }
    .hero-top p  { font-size:13px; opacity:.8; margin-top:2px; }
    .hero-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,.7); cursor:pointer; flex-shrink:0; }

    /* 2×2 action grid */
    .action-grid-2x2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .act-btn { display:flex; align-items:center; gap:8px; padding:11px 12px; border-radius:10px; border:none; cursor:pointer; font-family:var(--font-h); font-size:12px; font-weight:700; transition:opacity .2s; }
    .act-btn:hover { opacity:.85; }
    .act-btn svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
    .act-green  { background:var(--green);  color:#fff; }
    .act-orange { background:var(--orange); color:#fff; }
    .act-blue   { background:#1565C0;       color:#fff; }
    .act-purple { background:#6A1B9A;       color:#fff; }

    /* summary 2-col cards */
    .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px; }
    .summary-card { background:var(--surface); border-radius:var(--r-card); padding:14px; box-shadow:var(--shadow-sm); }
    .summary-card .sc-label { font-size:11px; color:var(--text-muted); font-family:var(--font-h); margin-bottom:4px; }
    .summary-card .sc-value { font-family:var(--font-h); font-size:20px; font-weight:800; color:var(--text); }
    .summary-card .sc-value.green { color:var(--green); }

    /* Line chart */
    .chart-wrap { background:var(--surface); padding:16px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .chart-wrap h3 { font-family:var(--font-h); font-size:14px; font-weight:700; margin-bottom:12px; }
    .chart-svg { width:100%; height:140px; display:block; }
    .chart-label { font-family:var(--font-h); font-size:10px; fill:var(--text-muted); }
    .chart-val   { font-family:var(--font-h); font-size:9px; fill:var(--green); font-weight:700; }
  </style>
</head>
<body>
<div class="app has-nav">

  <!-- Hero -->
  <div class="admin-hero">
    <div class="hero-top">
      <div>
        <h2>Admin Dashboard</h2>
        <p id="admin-welcome">Welcome!</p>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <img class="hero-avatar" id="hero-avatar" src="" alt="avatar"
             onclick="window.location.href='profile.html'" title="My Profile"/>
        <div style="display:flex;align-items:center;gap:4px;">
          <svg width="22" height="15" viewBox="0 0 22 15" xmlns="http://www.w3.org/2000/svg" style="border-radius:2px;">
            <rect width="22" height="5"   y="0"  fill="#1EB53A"/>
            <rect width="22" height="5"   y="5"  fill="#FFFFFF"/>
            <rect width="22" height="5"   y="10" fill="#0072C6"/>
          </svg>
          <span style="font-family:var(--font-h);font-size:10px;font-weight:600;opacity:.85;color:#fff;">Sierra Leone</span>
        </div>
      </div>
    </div>

    <!-- 2×2 action buttons -->
    <div class="action-grid-2x2">
      <button class="act-btn act-green"  onclick="toast('Vendor management coming soon!')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Manage Vendors
      </button>
      <button class="act-btn act-orange" onclick="toast('User management coming soon!')">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Manage Users
      </button>
      <button class="act-btn act-blue"   onclick="toast('Rider management coming soon!')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Manage Riders
      </button>
      <button class="act-btn act-purple" onclick="window.location.href='admin-orders.html'">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        View Orders
      </button>
    </div>
  </div>

  <!-- Body -->
  <div style="flex:1;overflow-y:auto;background:var(--page-bg);">

    <!-- Today's summary 2-col cards -->
    <div class="summary-grid" id="summary-cards"></div>

    <!-- Line chart -->
    <div class="chart-wrap">
      <h3>📈 Earnings Overview</h3>
      <svg class="chart-svg" id="earn-chart" viewBox="0 0 320 120" preserveAspectRatio="none"></svg>
    </div>

    <!-- Recent orders -->
    <p class="section-head" style="margin-top:8px;">Recent Orders</p>
    <div id="all-orders"></div>

    <div style="padding:14px;">
      <button class="btn-green" style="background:#F5F5F5;color:var(--text);border:1.5px solid var(--border);" onclick="App.logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="admin.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </a>
    <a class="nav-item" href="admin-deliveries.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Deliveries
    </a>
    <a class="nav-item" href="menu.html">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Menu
    </a>
    <a class="nav-item" href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Users
    </a>
  </nav>
</div>

<div id="toast"></div>
<script src="app.js"></script>
<script>
  requireAuth();
  if (App.user.role !== 'admin') window.location.href = 'menu.html';

  const av = localStorage.getItem('fms_avatar_' + App.user.id);
  document.getElementById('hero-avatar').src = av ||
    'https://ui-avatars.com/api/?name=' + encodeURIComponent(App.user.name) + '&background=1a1a2e&color=fff&size=100';

  function render() {
    const u       = App.user;
    document.getElementById('admin-welcome').textContent = 'Welcome, ' + u.name.split(' ')[0] + '!';

    const all      = App.orders;
    const revenue  = all.reduce((s,o) => s+o.total, 0);
    const users    = getUsers().length;
    const pending  = all.filter(o=>o.status==='pending').length;
    const transit  = all.filter(o=>o.status==='transit').length;

    /* Summary cards */
    document.getElementById('summary-cards').innerHTML = `
      <div class="summary-card">
        <div class="sc-label">Today's Earnings</div>
        <div class="sc-value green">SLE ${revenue}</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">Total Orders</div>
        <div class="sc-value">${all.length}</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">Pending Orders</div>
        <div class="sc-value">${pending}</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">In Delivery</div>
        <div class="sc-value">${transit}</div>
      </div>
    `;

    /* Line chart */
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const vals = [320, 480, 390, 560, 750, 620, revenue||450];
    const max  = Math.max(...vals, 1);
    const W=320, H=100, pad=30;
    const pts = vals.map((v,i)=>({
      x: pad+(i/(vals.length-1))*(W-2*pad),
      y: H-pad-(v/max)*(H-2*pad), v
    }));
    const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
    const areaPath = `M${pts[0].x},${H-pad} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${H-pad} Z`;

    document.getElementById('earn-chart').innerHTML = `
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2A7A2E" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#2A7A2E" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#ag)"/>
      ${[0,.25,.5,.75,1].map(t=>`<line x1="${pad}" y1="${H-pad-(t*(H-2*pad))}" x2="${W-pad}" y2="${H-pad-(t*(H-2*pad))}" stroke="#E0E0E0" stroke-width="0.5"/>`).join('')}
      <polyline points="${polyline}" fill="none" stroke="#2A7A2E" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map((p,i)=>`
        <circle cx="${p.x}" cy="${p.y}" r="3" fill="#2A7A2E"/>
        <text x="${p.x}" y="${p.y-7}" text-anchor="middle" class="chart-val">SLE ${p.v}</text>
        <text x="${p.x}" y="${H-8}" text-anchor="middle" class="chart-label">${days[i]}</text>
      `).join('')}
    `;

    /* Recent orders */
    const aord = document.getElementById('all-orders');
    if (all.length === 0) {
      aord.innerHTML = `<p style="padding:16px;font-size:13px;color:var(--text-muted);">No orders placed yet.</p>`;
      return;
    }
    aord.innerHTML = all.slice(0,10).map(o => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--border);">
        <div>
          <div style="font-family:var(--font-h);font-size:13px;font-weight:700;">${o.id}</div>
          <div style="font-size:11px;color:var(--text-muted);">${o.items.length} item(s) · ${o.location}</div>
        </div>
        <span class="status-badge ${STATUS[o.status]?.cls||'s-pending'}">${STATUS[o.status]?.label||o.status}</span>
        <span style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--green);">SLE ${o.total}</span>
      </div>
    `).join('');
  }
  render();
</script>
</body>
</html>
