<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rider Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app has-nav">

  <!-- Hero banner -->
  <div class="hero-banner" style="background:linear-gradient(135deg,#0D47A1,#1565C0);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <h2 id="rider-name">Rider Dashboard</h2>
        <p id="rider-welcome">Welcome!</p>
      </div>
      <div style="font-size:38px;">🛵</div>
    </div>
  </div>

  <div style="flex:1;overflow-y:auto;">

    <!-- Stats -->
    <div class="stat-row" id="rider-stats"></div>

    <!-- New deliveries -->
    <p class="section-head">New Deliveries</p>
    <div id="new-deliveries"></div>

    <!-- Past deliveries -->
    <p class="section-head" style="margin-top:8px;">Past Deliveries</p>
    <div id="past-deliveries"></div>

    <!-- Logout -->
    <div style="padding:0 14px 20px;">
      <button class="btn-green" style="background:#F5F5F5;color:var(--text);border:1.5px solid var(--border);" onclick="App.logout()">🚪 Logout</button>
    </div>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="rider.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </a>
    <a class="nav-item" onclick="toast('Deliveries list coming soon!')">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Deliveries
    </a>
    <a class="nav-item" onclick="toast('Earnings page coming soon!')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Earnings
    </a>
    <a class="nav-item" onclick="App.logout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </a>
  </nav>

</div>
<div id="toast"></div>
<script src="app.js"></script>
<script>
  requireAuth();
  if (App.user.role !== 'rider' && App.user.role !== 'admin') window.location.href = 'menu.html';

  function render() {
    const u = App.user;
    document.getElementById('rider-name').textContent    = u.name;
    document.getElementById('rider-welcome').textContent = 'Hi ' + u.name.split(' ')[0] + ', ready to deliver?';

    const all  = App.orders;
    const newD = all.filter(o => o.status === 'preparing');
    const done = all.filter(o => o.status === 'delivered');

    document.getElementById('rider-stats').innerHTML = `
      <div class="stat-box"><div class="sn">${newD.length}</div><div class="sl">New</div></div>
      <div class="stat-box"><div class="sn">${done.length}</div><div class="sl">Completed</div></div>
      <div class="stat-box"><div class="sn" style="font-size:16px;">${done.length * 5}</div><div class="sl">SLE Earned</div></div>
    `;

    /* New deliveries */
    const nd = document.getElementById('new-deliveries');
    if (newD.length === 0) {
      nd.innerHTML = `<p style="padding:16px;font-size:13px;color:var(--text-muted);">No new deliveries assigned.</p>`;
    } else {
      nd.innerHTML = newD.map(o => `
        <div class="order-card" style="border-left-color:var(--orange);">
          <div class="order-card-head">
            <span class="order-card-id">${o.id}</span>
            <span class="status-badge s-preparing">Ready to Pick Up</span>
          </div>
          <div class="order-card-items">${o.items.map(i=>i.name+'×'+i.qty).join(', ')}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">📍 ${o.location} · SLE ${o.total}</div>
          <div class="order-card-footer">
            <button class="oc-btn oc-reject" onclick="toast('Call customer feature coming soon!')">📞 Call Customer</button>
            <button class="oc-btn oc-deliver" onclick="markDelivered('${o.id}')">✅ Complete</button>
          </div>
        </div>
      `).join('');
    }

    /* Past deliveries */
    const pd = document.getElementById('past-deliveries');
    if (done.length === 0) {
      pd.innerHTML = `<p style="padding:0 16px 16px;font-size:13px;color:var(--text-muted);">No completed deliveries yet.</p>`;
    } else {
      pd.innerHTML = done.slice(0,5).map(o => `
        <div class="order-card">
          <div class="order-card-head">
            <span class="order-card-id">${o.id}</span>
            <span class="status-badge s-delivered">Delivered</span>
          </div>
          <div class="order-card-items">${o.items.map(i=>i.name+'×'+i.qty).join(', ')}</div>
          <div style="font-size:12px;color:var(--green);font-weight:700;">Earned: SLE 5</div>
        </div>
      `).join('');
    }
  }

  function markDelivered(id) {
    const orders = App.orders;
    const o = orders.find(x => x.id === id);
    if (o) { o.status = 'delivered'; App.setOrders(orders); toast('Order ' + id + ' delivered! 🎉'); render(); }
  }

  render();
</script>
</body>
</html>
