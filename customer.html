<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app has-nav">

  <!-- Green hero banner -->
  <div class="hero-banner">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <h2 id="greet">Welcome!</h2>
        <p id="role-line">Customer Dashboard</p>
      </div>
      <div style="font-size:40px;">👤</div>
    </div>
  </div>

  <!-- Stats row -->
  <div class="stat-row" id="stats"></div>

  <!-- Quick actions -->
  <p class="section-head">Quick Actions</p>
  <div style="padding:0 14px;display:flex;flex-direction:column;gap:10px;">
    <a href="menu.html"     class="btn-green" style="text-align:center;padding:13px;">🍽️ Browse Menu</a>
    <a href="cart.html"     class="btn-green" style="text-align:center;padding:13px;background:var(--orange);">🛒 View Cart</a>
    <button class="btn-green" style="background:#F5F5F5;color:var(--text);border:1.5px solid var(--border);" onclick="App.logout()">🚪 Logout</button>
  </div>

  <!-- Recent orders -->
  <p class="section-head" style="margin-top:16px;">Recent Orders</p>
  <div id="recent-orders"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="customer.html" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-item" href="menu.html" data-page="menu">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Menu
    </a>
    <a class="nav-item nav-cart" href="cart.html" data-page="cart">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
      </div>
      Cart
    </a>
    <a class="nav-item" href="auth.html" data-page="login">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

</div>
<div id="toast"></div>
<script src="app.js"></script>
<script>
  requireAuth();

  function render() {
    const u = App.user;
    document.getElementById('greet').textContent     = 'Hi, ' + u.name.split(' ')[0] + '! 👋';
    document.getElementById('role-line').textContent = 'Customer Dashboard';

    const myOrders = App.orders.filter(o => o.userId === u.id);
    const spent    = myOrders.reduce((s,o) => s + o.total, 0);

    /* Stats */
    document.getElementById('stats').innerHTML = `
      <div class="stat-box"><div class="sn">${myOrders.length}</div><div class="sl">Orders</div></div>
      <div class="stat-box"><div class="sn">${spent}</div><div class="sl">SLE Spent</div></div>
      <div class="stat-box"><div class="sn">${cartCount()}</div><div class="sl">In Cart</div></div>
    `;

    /* Recent orders */
    const ro = document.getElementById('recent-orders');
    if (myOrders.length === 0) {
      ro.innerHTML = `<p style="padding:16px;font-size:13px;color:var(--text-muted);">No orders yet. <a href="menu.html" style="color:var(--green);font-weight:700;">Order now →</a></p>`;
      return;
    }
    ro.innerHTML = myOrders.slice(0,5).map(o => `
      <div class="order-card" onclick="window.location.href='track.html?id=${encodeURIComponent(o.id)}'">
        <div class="order-card-head">
          <span class="order-card-id">${o.id}</span>
          <span class="status-badge ${STATUS[o.status]?.cls || 's-pending'}">${STATUS[o.status]?.label || o.status}</span>
        </div>
        <div class="order-card-items">${o.items.map(i=>i.name+'×'+i.qty).join(', ')}</div>
        <div style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--green);">SLE ${o.total}</div>
      </div>
    `).join('');
  }

  render();
  setActiveNav('home');
</script>
</body>
</html>
