<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app has-nav">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back" onclick="history.back()">&#8249;</button>
    <h2>Checkout</h2>
    <div class="spacer"></div>
  </div>

  <div style="flex:1;overflow-y:auto;">

    <!-- ── Delivery Address ── -->
    <p class="section-head">Delivery Address</p>
    <div class="detail-block">
      <span class="icon">🏠</span>
      <div class="text">
        <!-- Shows user's saved address or lets them pick -->
        <strong id="addr-main">12 Main St., Freetown</strong>
        <span id="addr-sub">12 Yoni Village, Makeni</span>
      </div>
      <button class="edit-btn" onclick="showLocationPicker()">Edit</button>
    </div>

    <!-- Location picker (hidden by default) -->
    <div id="loc-picker" style="display:none;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);">
      <p style="font-size:12px;color:var(--text-sub);margin-bottom:8px;font-family:var(--font-h);">Select delivery location:</p>
      <select id="loc-select"
              style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--r-input);font-family:var(--font-b);font-size:14px;background:var(--surface);"
              onchange="applyLocation(this.value)">
      </select>
    </div>

    <div class="gap8"></div>

    <!-- ── Payment Method ── -->
    <p class="section-head">Payment Method</p>
    <div class="detail-block" id="pay-block">
      <span class="icon">💳</span>
      <div class="text">
        <strong id="pay-label">Credit Card</strong>
        <span id="pay-sub">***** ********* 5678</span>
      </div>
      <button class="edit-btn" onclick="togglePayPicker()">Edit</button>
    </div>

    <!-- Payment picker -->
    <div id="pay-picker" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);">
      <label style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;">
        <input type="radio" name="pay" value="card" checked onchange="setPayment(this.value)"/> 💳 Credit / Debit Card
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;">
        <input type="radio" name="pay" value="mobile" onchange="setPayment(this.value)"/> 📱 Mobile Money
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;">
        <input type="radio" name="pay" value="cash" onchange="setPayment(this.value)"/> 💵 Cash on Delivery
      </label>
    </div>

    <div class="gap8"></div>

    <!-- ── Order Summary ── -->
    <p class="section-head">Order Summary</p>
    <div id="order-summary"></div>

    <!-- ── Total ── -->
    <div class="info-row total-row" style="margin-top:0;">
      <span class="label">Total</span>
      <span class="value" id="total-val">SLE 0</span>
    </div>

    <div class="gap8"></div>

    <!-- ── Place Order button ── -->
    <div style="padding:14px 16px 20px;">
      <button class="btn-green" onclick="doPlaceOrder()">Place Order</button>
    </div>

  </div><!-- /scroll -->

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="index.html" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-item" href="menu.html" data-page="menu">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Menu
    </a>
    <a class="nav-item" href="cart.html" data-page="cart">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
      </div>
      Cart
    </a>
    <a class="nav-item" href="auth.html" data-page="login">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Login /&nbsp;<br/>Register
    </a>
  </nav>

</div>
<div id="toast"></div>
<script src="app.js"></script>
<script>
  requireAuth();
  if (App.cart.length === 0) window.location.href = 'cart.html';

  /* Current selections */
  let selectedLocation = App.user ? App.user.address : LOCATIONS[0];
  let selectedPayment  = 'card';

  const PAY_LABELS = { card:'Credit Card', mobile:'Mobile Money', cash:'Cash on Delivery' };
  const PAY_SUBS   = { card:'***** ********* 5678', mobile:'Orange / Afrimoney', cash:'Pay on delivery' };

  /* Populate address from user profile */
  function initAddress() {
    document.getElementById('addr-main').textContent = selectedLocation;
    document.getElementById('addr-sub').textContent  = 'Yoni Village, Makeni';
    /* Populate location select options */
    const sel = document.getElementById('loc-select');
    LOCATIONS.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l; opt.textContent = l;
      if (l === selectedLocation) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function showLocationPicker() {
    const p = document.getElementById('loc-picker');
    p.style.display = p.style.display === 'none' ? '' : 'none';
  }

  function applyLocation(val) {
    selectedLocation = val;
    document.getElementById('addr-main').textContent = val;
    document.getElementById('loc-picker').style.display = 'none';
  }

  function togglePayPicker() {
    const p = document.getElementById('pay-picker');
    p.style.display = p.style.display === 'none' ? '' : 'none';
  }

  function setPayment(val) {
    selectedPayment = val;
    document.getElementById('pay-label').textContent = PAY_LABELS[val];
    document.getElementById('pay-sub').textContent   = PAY_SUBS[val];
    document.getElementById('pay-picker').style.display = 'none';
  }

  /* Render order summary items */
  function renderSummary() {
    document.getElementById('order-summary').innerHTML = App.cart.map(i => `
      <div class="info-row">
        <span class="label">${i.name} × ${i.qty}</span>
        <span class="value">SLE ${i.price * i.qty}</span>
      </div>
    `).join('');
    document.getElementById('total-val').textContent = 'SLE ' + (cartTotal() + 5);
  }

  /* Place order and go to tracking */
  function doPlaceOrder() {
    const order = placeOrder(selectedLocation, selectedPayment);
    toast('🎉 Order placed successfully!');
    setTimeout(() => window.location.href = 'track.html?id=' + encodeURIComponent(order.id), 700);
  }

  initAddress();
  renderSummary();
</script>
</body>
</html>
